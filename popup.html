<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>GemLog</title>
  <style>
    /* （CSSは変更なしなのでそのまま） */
    :root {
      --bg: #1a1a2e;
      --bg-card: #16213e;
      --bg-hover: #1a2744;
      --accent: #4a9eff;
      --accent-dim: #2d6abf;
      --text: #e8e8e8;
      --text-dim: #8899aa;
      --border: #2a3a5a;
      --danger: #e74c3c;
      --success: #2ecc71;
      --warning: #f39c12;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      min-height: 300px;
      max-height: 580px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      overflow-y: auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--accent), #6c5ce7);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-right {
      display: flex;
      gap: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      margin-right: 6px;
    }

    .status-dot.active { background: var(--success); }

    /* Tab navigation */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
    }

    .tab {
      padding: 8px 14px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Panel */
    .panel { display: none; padding: 12px 16px; }
    .panel.active { display: block; }

    /* Chat list */
    .chat-list { display: flex; flex-direction: column; gap: 6px; }

    .chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chat-item:hover { background: var(--bg-hover); border-color: var(--accent-dim); }

    .chat-info {
      flex: 1;
      min-width: 0;
      margin-right: 8px;
    }

    .chat-title {
      font-weight: 500;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .chat-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    /* Buttons */
    .btn {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--bg-hover); border-color: var(--accent-dim); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-dim); }
    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .btn.danger:hover { background: var(--danger); color: #fff; }
    .btn.sm { padding: 3px 8px; font-size: 10px; }

    .icon-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }

    .icon-btn:hover { background: var(--bg-hover); color: var(--text); }

    /* Settings form */
    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    select, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input:focus { border-color: var(--accent); }

    /* Storage bar */
    .storage-bar {
      margin: 12px 0;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .storage-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .storage-progress {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .storage-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }

    /* Chat detail view */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-header h2 {
      font-size: 14px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message-preview {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg-card);
    }

    .msg {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .msg:last-child { border-bottom: none; }

    .msg-role {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .msg-role.model { color: var(--warning); }

    .msg-content {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 80px;
      overflow: hidden;
    }

    /* Summary area */
    .summary-area {
      margin-top: 12px;
      padding: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .summary-area h3 {
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-text {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text);
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Section divider */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }

    .section-title:first-child { margin-top: 0; }

    .footer-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo">📋</div>
      <h1>GemLog</h1>
      <div class="status-dot" id="statusDot" title="Inactive"></div>
    </div>
    <div class="header-right">
      <div class="icon-btn" id="refreshBtn" data-i18n-title="btnRefreshTitle">🔄</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="chats" data-i18n="tabChats">チャット</div>
    <div class="tab" data-tab="detail" id="detailTab" style="display:none" data-i18n="tabDetail">詳細</div>
    <div class="tab" data-tab="settings" data-i18n="tabSettings">設定</div>
  </div>

  <div class="panel active" id="panelChats">
    <div class="storage-bar">
      <div class="storage-label">
        <span data-i18n="storageUsageLabel">ストレージ使用量</span>
        <span id="storageUsage">0 MB</span>
      </div>
      <div class="storage-progress">
        <div class="storage-progress-fill" id="storageBar" style="width: 0%"></div>
      </div>
    </div>

    <div id="currentChatStatus" class="storage-bar" style="display:none; border-color: var(--accent-dim); background: var(--bg-hover);">
      <div class="storage-label">
        <span id="currentChatName" style="color: var(--accent); font-weight: 600;" data-i18n="currentChatLabel">現在のチャット</span>
        <span id="loggingBadge" style="font-size: 9px; padding: 2px 5px; border-radius: 4px; background: var(--border);">判定中</span>
      </div>
      <button class="btn sm primary" id="toggleLoggingBtn" style="width: 100%; margin-top: 8px;">記録</button>
      <button class="btn sm" id="autoScrollBtn" style="width: 100%; margin-top: 6px; display: none; background: var(--bg-card); border-color: var(--accent);" data-i18n="btnAutoScroll">⬆️ 全ての過去ログを自動取得</button>
    </div>

    <div id="chatList" class="chat-list">
      <div class="empty-state">
        <div class="icon">💬</div>
        <p data-i18n="noChatsMessage">ログされたチャットはありません</p>
        <p style="font-size:11px;margin-top:4px;" data-i18n="noChatsSubMessage">Geminiでチャットを始めると自動的に記録されます</p>
      </div>
    </div>
  </div>

  <div class="panel" id="panelDetail">
    <div class="detail-header">
      <div class="icon-btn" id="backBtn" title="←">←</div>
      <h2 id="detailTitle">Chat Title</h2>
    </div>

    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button class="btn primary" id="copyMdBtnDetail" data-i18n="btnCopyMdDetail"></button>
      <button class="btn primary" id="copyJsonBtnDetail" data-i18n="btnCopyJsonDetail"></button>
      <button class="btn" id="summarizeBtn" data-i18n="btnSummarize"></button>
      <button class="btn danger sm" id="deleteChatBtn" title="Delete">🗑</button>
    </div>

    <div id="summaryArea" class="summary-area" style="display:none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
        <h3 style="margin-bottom: 0;" data-i18n="titleAiSummary">✨ AI要約</h3>
        <button class="btn sm" id="copySummaryBtn" style="display: none;" data-i18n="btnCopy">📋 コピー</button>
      </div>
      <div class="summary-text" id="summaryText">...</div>
    </div>

    <div class="message-preview" id="messagePreview"></div>
  </div>

  <div class="panel" id="panelSettings">
    <div class="section-title" data-i18n="sectionLogSettings">ログ設定</div>

    <div class="form-group">
      <label data-i18n="labelLoggingMode">ログ記録モード</label>
      <select id="loggingMode">
        <option value="all" data-i18n="optLogAll">全チャットを記録</option>
        <option value="blacklist" data-i18n="optLogBlacklist">除外リスト以外を記録</option>
        <option value="whitelist" data-i18n="optLogWhitelist">指定したチャットのみ記録</option>
      </select>
    </div>

    <div class="form-group" id="listManagementArea" style="display:none; margin-top: 12px;">
      <label id="listManagementLabel">管理リスト</label>
      <div id="managedList" style="max-height: 120px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 4px; background: rgba(0,0,0,0.1);">
      </div>
    </div>
    
    <div class="section-title" data-i18n="sectionApiSettings">API設定（要約機能用）</div>

    <div class="form-group">
      <label data-i18n="labelApiProvider">APIプロバイダ</label>
      <select id="apiProvider">
        <option value="none" data-i18n="optApiNone">なし（要約機能OFF）</option>
        <option value="google">Google AI Studio (Gemini)</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="custom" data-i18n="optApiCustom">カスタム（OpenAI互換）</option>
      </select>
    </div>

    <div id="apiFields" style="display:none;">
      <div class="form-group">
        <label data-i18n="labelApiKey">APIキー</label>
        <input type="password" id="apiKey" placeholder="sk-... / AIza...">
      </div>

      <div class="form-group">
        <label data-i18n="labelApiModel">モデル名（空欄でデフォルト）</label>
        <input type="text" id="apiModel" placeholder="gpt-4o-mini / gemini-2.0-flash">
      </div>

      <div class="form-group" id="endpointGroup" style="display:none;">
        <label data-i18n="labelApiEndpoint">APIエンドポイント</label>
        <input type="text" id="apiEndpoint" placeholder="https://api.example.com/v1/chat/completions">
      </div>
    </div>

    <button class="btn primary" id="saveSettingsBtn" style="width:100%;" data-i18n="btnSaveSettings">設定を保存</button>

    <div class="footer-actions">
      <button class="btn danger" id="deleteAllBtn" style="flex:1;" data-i18n="btnDeleteAll">全ログを削除</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="lib/storage-manager.js"></script>
  <script type="module" src="popup/main.js"></script>
</body>
</html>
